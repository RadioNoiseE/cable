COMMON_FLAGS="-march=native -O2 -pipe"

CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"

FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

CHOST="x86_64-pc-linux-musl"
CPU_FLAGS_X86="aes avx avx2 avx_vnni bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sha sse sse2 sse3 sse4_1 sse4_2 ssse3 vpclmulqdq"

INPUT_DEVICES="libinput synaptics"
VIDEO_CARDS="intel"

MAKEOPTS="-j8 -l16"
EMERGE_DEFAULT_OPTS="--quiet-build=y"

LC_MESSAGES="C.UTF-8"

ACCEPT_KEYWORDS="~amd64"
ACCEPT_LICENSE="*"

USE="dbus -python vaapi vulkan wayland -X"

LLVM_SLOT="22"

PYTHON_TARGETS="python3_14"
PYTHON_SINGLE_TARGET="${PYTHON_TARGETS}"

CURL_DEFAULT_OPTS="--create-dirs -f -L -o \${FILE} --output-dir \${DISTDIR} --retry 3 \${URI}"

FETCHCOMMAND="/usr/bin/curl ${CURL_DEFAULT_OPTS}"
RESUMECOMMAND="/usr/bin/curl -C - ${CURL_DEFAULT_OPTS}"
